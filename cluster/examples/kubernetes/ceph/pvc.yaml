kind: PersistentVolumeClaim
apiVersion: v1
metadata:
  name: example-pvc
  namespace: rook-ceph
spec:
  accessModes:
  - ReadWriteOnce
  volumeMode: Block
  resources:
    requests:
      storage: 5Gi
  storageClassName: fast-disks
